<!DOCTYPE html>
<html>
<head>
    <title>Cyber Security</title>
</head>

<body>
     <center><h1> AUDIO & VIDEO TAGS </h1></center>

    <div class="AV tags">

    <img src="IAV/LW.jpg" alt="Health Tip" width="600" height="500">
   

    <div class="AT">

    <h2>Audio controls</h2>
    <audio controls><source src="IAV/MA.mp3" type="audio/mpeg"></audio>

    <h2>Autoplay</h2>
    <audio controls autoplay><source src="IAV/MA.mp3" type="audio/mpeg"></audio>

    <h2>Loop</h2>
    <audio controls loop> <source src="IAV/MA.mp3" type="audio/mpeg"> </audio>

    </div>

    <div class="VT">

    <h2>video controls</h2>
    <video width="400" height="300" controls> <source src="IAV/SS.mp4" type="video/mp4"> </video>
    
    <h2>Muted</h2>
    <video width="400" height="300" controls muted> <source src="IAV/SS.mp4" type="video/mp4"> </video>

    <h2>Loop</h2>
    <video width="400" height="300" controls loop> <source src="IAV/EA.mp4" type="video/mp4"> </video>

    <h2>Autoplay Video </h2>
    <video width="400" height="300" controls autoplay mute loop><source src="IAV/EA.mp4" type="video/mp4"></video>

    </div>

    </div>

</body>
</html>
